; SkyrimNet Physical Diaries Configuration

[Diary]
; Maximum number of diary entries per volume before creating a new book
; Default: 10
; Recommended range: 5-20
EntriesPerVolume = 20

[Fonts]
; Font sizes for different parts of the diary
; These control the HTML <font size='X'> tags used in book formatting

; Title page font size ("Bob's Diary")
; Default: 18
TitleSize = 18

; Date header font size (shown above each entry)
; Default: 16
DateSize = 16

; Main diary content font size (the entry text itself)
; Default: 14
ContentSize = 14

; Small text font size (used for subtitle text like date ranges)
; Default: 12
SmallSize = 12
